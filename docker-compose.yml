services:
  # ─── Database ───────────────────────────────────────
  iot-postgres:
    image: postgres:16-alpine
    container_name: iot-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iot_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-iot_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iot_admin -d iot_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Cache ──────────────────────────────────────────
  iot-redis:
    image: redis:7-alpine
    container_name: iot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API Backend ────────────────────────────────────
  iot-api:
    build:
      context: .
      dockerfile: ./docker/api/Dockerfile
    container_name: iot-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-iot_admin}:${POSTGRES_PASSWORD:-iot_secret}@iot-postgres:5432/${POSTGRES_DB:-iot_platform}
      REDIS_URL: redis://iot-redis:6379
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@host.docker.internal:5672}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_super_secret_access_key_at_least_32ch}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_super_secret_refresh_key_at_least_32c}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      COOKIE_SECRET: ${COOKIE_SECRET:-change_me_cookie_secret_key_in_production}
    depends_on:
      iot-postgres:
        condition: service_healthy
      iot-redis:
        condition: service_healthy

  # ─── Admin Web ──────────────────────────────────────
  iot-admin-web:
    build:
      context: .
      dockerfile: ./docker/admin-web/Dockerfile
    container_name: iot-admin-web
    restart: unless-stopped
    depends_on:
      - iot-api

  # ─── Tenant Web ─────────────────────────────────────
  iot-tenant-web:
    build:
      context: .
      dockerfile: ./docker/tenant-web/Dockerfile
    container_name: iot-tenant-web
    restart: unless-stopped
    depends_on:
      - iot-api

  # ─── Reverse Proxy ─────────────────────────────────
  iot-nginx:
    image: nginx:1.25-alpine
    container_name: iot-nginx
    restart: unless-stopped
    ports:
      - "14376:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - iot-api
      - iot-admin-web
      - iot-tenant-web

volumes:
  postgres_data:
  redis_data:
