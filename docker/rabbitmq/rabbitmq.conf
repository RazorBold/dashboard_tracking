# ─── MQTT Plugin ──────────────────────────────────────
# Accepts MQTT connections on port 1883, converts topics to AMQP routing keys
# MQTT topic separator "/" is converted to "." automatically
# e.g. device/IMEI/position → routing key: device.IMEI.position
mqtt.listeners.tcp.default = 1883
mqtt.allow_anonymous        = true
mqtt.exchange               = amq.topic
mqtt.max_session_expiry_interval_seconds = 86400
mqtt.prefetch               = 10

# ─── Management UI ────────────────────────────────────
management.tcp.port = 15672

# ─── Logging ──────────────────────────────────────────
log.console = true
log.console.level = info
